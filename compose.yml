---
services:
  postfix:
    image: ghcr.io/hensing/postfix-relay:latest
    container_name: postfix-relay
    hostname: ${MYHOSTNAME:?Set MYHOSTNAME in .env}
    ports:
      - "587:587" # SMTP Submission Port with authentication
    volumes:
      - ./config/main.cf:/etc/postfix/main.cf
      - ./config/master.cf:/etc/postfix/master.cf
      - ./config/smtpd.conf:/etc/sasl2/smtpd.conf
      - ./config/sender_login_map.pcre:/etc/postfix/sender_login_map.pcre
      - ./config/sasl_passwd:/etc/postfix/sasl_passwd
      - ./config/users.txt:/etc/postfix/users.txt
      - ./data:/var/log/postfix
      # TLS certificate + private key, provided by an external ACME client
      # (e.g. Caddy) - not managed by this project. See README "TLS Certificates".
      - ${CERTS_DIR:-./certs}:/etc/postfix/certs:ro
    env_file:
      - .env
    cap_drop:
      - ALL
    cap_add:
      - CHOWN        # entrypoint chowns bind-mounted config + dpkg-reconfigure's set-permissions step
      - DAC_OVERRIDE  # root reading/writing files it doesn't strictly own during reconfigure/startup
      - FOWNER        # chmod/chown on sasl_passwd, users.txt, sasldb2 without exact owner match
      - SETGID        # master drops forked children (smtpd/qmgr/pickup/cleanup) to the postfix group
      - SETUID        # master drops forked children to the postfix user - the actual privilege-drop
      - KILL          # SIGTERM trap -> `postfix stop`; master signalling children running under a different uid
    security_opt:
      - no-new-privileges:true
    healthcheck:
      # Not `postfix status`: it shells out to postfix-script, which logs
      # "the Postfix mail system is running" on every single invocation -
      # at a 30s interval that floods mail.log with noise. Check the master
      # pidfile directly instead; equivalent liveness signal, silent.
      test: ["CMD-SHELL", "test -f /var/spool/postfix/pid/master.pid && kill -0 \"$(cat /var/spool/postfix/pid/master.pid)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - mail
    restart: unless-stopped
    command: ["/usr/local/bin/entrypoint.sh"]

networks:
  mail:
    external: true
