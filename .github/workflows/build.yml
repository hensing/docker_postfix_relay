name: Lint and Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    # Weekly rebuild + rescan so base-image CVEs are caught even without a push,
    # since the base image is pinned by digest (see Dockerfile / .github/dependabot.yml).
    - cron: '17 4 * * 1'

jobs:
  lint:
    name: Lint Code Base
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Lint Shell Scripts
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: './'

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: ./Dockerfile
          # DL3008: apt packages are intentionally left unpinned so Debian's
          # own security updates flow in; the base image is digest-pinned instead
          # (see Dockerfile) and kept fresh via .github/dependabot.yml + the schedule above.
          ignore: DL3008
          failure-threshold: warning

  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Postfix image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: ghcr.io/${{ github.repository_owner }}/postfix-relay:latest

      - name: Scan Postfix image for vulnerabilities
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/postfix-relay:latest
          severity: HIGH,CRITICAL
          # Report-only for now: unpinned Debian packages will likely surface
          # pre-existing findings. Flip to exit-code: '1' once triaged.
          exit-code: '0'

      - name: Push Postfix image
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/postfix-relay:latest
