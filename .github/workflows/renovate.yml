name: Renovate

on:
  schedule:
    # Weekly, matches the digest-pin philosophy in Dockerfile/renovate.json
    - cron: '5 4 * * 1'
  workflow_dispatch:
    inputs:
      dryRun:
        description: 'Run Renovate in dry-run mode (log only, no PRs)'
        type: boolean
        default: false

jobs:
  renovate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Self-hosted Renovate
        uses: renovatebot/github-action@v46.1.17
        env:
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          RENOVATE_DRY_RUN: ${{ github.event.inputs.dryRun == 'true' && 'full' || '' }}
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          configurationFile: renovate.json
